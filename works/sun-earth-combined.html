<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태양과 지구 · 계절과 일사량 시뮬레이션</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000008;
    --panel: rgba(20, 20, 30, 0.85);
    --border: rgba(255, 255, 255, 0.1);
    --text: #e8e8f0;
    --text-dim: #8a8a9a;
    --accent: #ffaa00;
    --accent-dim: rgba(255, 170, 0, 0.15);
  }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Tab bar */
  .tab-bar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    z-index: 20;
  }
  .tab {
    padding: 9px 22px;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* View panels */
  .view { position: fixed; inset: 0; display: none; }
  .view.active { display: block; }

  /* 3D view */
  #view-3d #canvas-container { position: absolute; inset: 0; }

  /* Shared UI panel */
  .ui-panel {
    position: fixed;
    top: 72px;
    left: 16px;
    width: 320px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 90px);
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    z-index: 10;
    overflow-y: auto;
  }
  .ui-panel h2 {
    margin: 0 0 4px 0;
    font-size: 1.02rem;
  }
  .ui-panel .subtitle {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-bottom: 14px;
  }
  .group { margin-bottom: 12px; }
  label {
    display: block;
    font-size: 0.82rem;
    color: #d0d0e0;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .val-tag { color: var(--accent); font-weight: 700; }

  select, input[type="range"] {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1a1a24;
    color: #fff;
    font-size: 0.88rem;
  }
  input[type="range"] { accent-color: var(--accent); padding: 0; }

  button {
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1a1a24;
    color: #fff;
    font-size: 0.85rem;
  }
  button:hover { background: #2a2a38; }
  button.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-row button { flex: 1; min-width: 60px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }

  .info {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.8rem;
    line-height: 1.5;
    margin-top: 10px;
  }
  .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .bar {
    height: 8px;
    background: #222;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 6px;
  }
  .bar > div {
    height: 100%;
    background: linear-gradient(90deg, #66bbff, #66cc66, #ffcc00, #ff6666);
    transition: width 0.2s;
  }
  .season-desc {
    margin-top: 8px;
    padding: 8px;
    background: rgba(255,170,0,0.1);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    font-size: 0.78rem;
    line-height: 1.45;
  }

  /* Legend (3D view) */
  #legend {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.76rem;
    z-index: 10;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .legend-swatch { width: 13px; height: 13px; border-radius: 3px; }

  /* 2D view */
  #view-2d {
    overflow: auto;
    padding: 72px 20px 20px;
  }
  .twodim-wrap {
    display: flex;
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }
  .twodim-wrap .ui-panel {
    position: static;
    max-height: none;
    width: 320px;
  }
  .simulation {
    position: relative;
    background: #0d0d14;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    border: 1px solid #2a2a35;
  }
  #simCanvas { display: block; }

  @media (max-width: 760px) {
    .tab-bar { top: 8px; padding: 3px; }
    .tab { padding: 7px 14px; font-size: 0.82rem; }
    .ui-panel { top: 58px; width: calc(100vw - 32px); left: 16px; }
    #legend { font-size: 0.68rem; padding: 8px 10px; }
    #view-2d { padding: 58px 12px 20px; }
    .twodim-wrap .ui-panel { width: 100%; }
    #simCanvas { max-width: 100%; height: auto; }
  }
</style>
</head>
<body>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab active" data-view="view-3d">🌍 3D 공전</button>
  <button class="tab" data-view="view-2d">☀️ 위도별 고도</button>
</div>

<!-- ========== 3D VIEW ========== -->
<div id="view-3d" class="view active">
  <div id="canvas-container"></div>

  <div class="ui-panel">
    <h2>태양-지구 3D 시뮬레이션</h2>
    <div class="subtitle">공전·자전에 따른 일사량 변화</div>

    <div class="group">
      <label>재생 속도: <span class="val-tag" id="speedLabel">0.5×</span></label>
      <input type="range" id="speedSlider" min="0" max="2" step="0.1" value="0.5">
      <div class="btn-row" style="margin-top:6px;">
        <button id="playBtn" class="active">⏸ 일시정지</button>
        <button id="resetBtn">↺ 리셋</button>
      </div>
    </div>

    <div class="group">
      <label>계절 바로가기</label>
      <div class="grid-4">
        <button data-season="0">🌸 봄</button>
        <button data-season="0.25">☀️ 여름</button>
        <button data-season="0.5">🍂 가을</button>
        <button data-season="0.75">❄️ 겨울</button>
      </div>
    </div>

    <div class="group">
      <label>관찰 지역</label>
      <select id="regionSelect3D">
        <option value="37.5">🇰🇷 대한민국 (북위 37.5°)</option>
        <option value="15.0">🇹🇭 태국 (북위 15°)</option>
        <option value="60.0">🇳🇴 노르웨이 오슬로 (북위 60°)</option>
        <option value="0.0">🌐 적도 (위도 0°)</option>
        <option value="-34.0">🇦🇺 호주 시드니 (남위 34°)</option>
      </select>
    </div>

    <div class="group">
      <label>위도 직접 조절: <span class="val-tag" id="latLabel">37.5° N</span></label>
      <input type="range" id="latSlider" min="-80" max="80" step="0.5" value="37.5">
    </div>

    <div class="info">
      <div class="info-row"><span>공전 위치</span><span class="val-tag" id="orbitPos">봄 근처</span></div>
      <div class="info-row"><span>태양 적위</span><span class="val-tag" id="decVal3D">0.0°</span></div>
      <div class="info-row"><span>현재 지방시</span><span class="val-tag" id="timeVal">12:00</span></div>
      <div class="info-row"><span>태양 고도</span><span class="val-tag" id="altVal3D">52.5°</span></div>
      <div class="info-row"><span>일사량</span><span class="val-tag" id="insVal">79%</span></div>
      <div class="bar"><div id="insBar" style="width:79%"></div></div>
      <div class="season-desc" id="seasonDesc3D">태양이 적도 근처에 있어 낮과 밤이 거의 같습니다.</div>
    </div>
  </div>

  <div id="legend">
    <div style="font-weight:700; margin-bottom:6px;">일사량 색상</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ff4444"></div>매우 강함 (80%+)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ffcc00"></div>강함 (50-80%)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#66cc66"></div>중간 (20-50%)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#4477ff"></div>약함 (0-20%)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#111"></div>밤</div>
  </div>
</div>

<!-- ========== 2D VIEW ========== -->
<div id="view-2d" class="view">
  <div class="twodim-wrap">
    <div class="ui-panel">
      <h2>위도별 태양 고도</h2>
      <div class="subtitle">월별 지구 자전축 기울기 변화와 각 위도별 태양의 남중고도·일사량</div>

      <div class="group">
        <label>관찰 지역</label>
        <select id="regionSelect2D">
          <option value="37.5">🇰🇷 대한민국 (북위 37.5°) - 뚜렷한 사계절</option>
          <option value="15.0">🇹🇭 태국 (북위 15°) - 열대 기후</option>
          <option value="60.0">🇳🇴 노르웨이 오슬로 (북위 60°) - 극심한 계절차</option>
          <option value="0.0">🌐 적도 (위도 0°) - 연중 일정</option>
          <option value="-34.0">🇦🇺 호주 시드니 (남위 34°) - 북반구와 반대</option>
        </select>
      </div>

      <div class="group">
        <label>월: <span class="val-tag" id="monthLabel">6월 (북반구 여름)</span></label>
        <input type="range" id="monthSlider" min="1" max="12" step="0.1" value="6">
      </div>

      <div class="info">
        <div class="info-row"><span>태양 적위</span><span class="val-tag" id="decVal2D">23.5°</span></div>
        <div class="info-row"><span>관측지 남중고도</span><span class="val-tag" id="altVal2D">76.0°</span></div>
        <div class="info-row"><span>상대적 일사량</span><span class="val-tag" id="sunVal">97%</span></div>
        <div class="season-desc" id="seasonDesc2D">여름철로, 태양 고도가 높아 빛이 집중되어 기온이 오릅니다.</div>
      </div>
    </div>

    <div class="simulation">
      <canvas id="simCanvas" width="600" height="400"></canvas>
    </div>
  </div>
</div>

<!-- ========== Tab switching ========== -->
<script>
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(t.dataset.view).classList.add('active');
      // Resize 3D renderer if switching back
      if (t.dataset.view === 'view-3d' && window.__onResize3D) window.__onResize3D();
    });
  });
</script>

<!-- ========== 3D Simulation (Three.js module) ========== -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 25, 55);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Starfield
const starsGeo = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 3000; i++) {
  const r = 400;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPositions.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, sizeAttenuation: true }));
scene.add(stars);

// Sun
const sunGroup = new THREE.Group();
scene.add(sunGroup);
const sun = new THREE.Mesh(new THREE.SphereGeometry(3.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffdd44 }));
sunGroup.add(sun);

// Sun glow sprite
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 256; glowCanvas.height = 256;
const gctx = glowCanvas.getContext('2d');
const grad = gctx.createRadialGradient(128, 128, 20, 128, 128, 128);
grad.addColorStop(0, 'rgba(255,220,80,0.9)');
grad.addColorStop(0.3, 'rgba(255,180,40,0.4)');
grad.addColorStop(1, 'rgba(255,120,0,0)');
gctx.fillStyle = grad;
gctx.fillRect(0, 0, 256, 256);
const glowTex = new THREE.CanvasTexture(glowCanvas);
const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, blending: THREE.AdditiveBlending, depthWrite: false }));
glow.scale.set(14, 14, 1);
sunGroup.add(glow);

scene.add(new THREE.AmbientLight(0x222244, 0.3));

const ORBIT_RADIUS = 30;
const AXIAL_TILT = 23.5 * Math.PI / 180;

// Orbit ring
const orbitRing = new THREE.Mesh(
  new THREE.RingGeometry(ORBIT_RADIUS - 0.05, ORBIT_RADIUS + 0.05, 128),
  new THREE.MeshBasicMaterial({ color: 0x444466, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
);
orbitRing.rotation.x = Math.PI / 2;
scene.add(orbitRing);

// Earth pivot / tilt / spin
const earthPivot = new THREE.Object3D();
scene.add(earthPivot);
const earthTiltGroup = new THREE.Object3D();
earthTiltGroup.rotation.z = AXIAL_TILT;
earthPivot.add(earthTiltGroup);
const earthSpin = new THREE.Object3D();
earthTiltGroup.add(earthSpin);

// Earth texture
const earthCanvas = document.createElement('canvas');
earthCanvas.width = 1024; earthCanvas.height = 512;
const ectx = earthCanvas.getContext('2d');
const oceanGrad = ectx.createLinearGradient(0, 0, 0, 512);
oceanGrad.addColorStop(0, '#1a4a7a');
oceanGrad.addColorStop(0.5, '#2266aa');
oceanGrad.addColorStop(1, '#1a4a7a');
ectx.fillStyle = oceanGrad;
ectx.fillRect(0, 0, 1024, 512);
function blob(cx, cy, rx, ry, color) {
  ectx.fillStyle = color;
  ectx.beginPath();
  ectx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ectx.fill();
}
blob(180, 180, 90, 70, '#3a8a3a');
blob(220, 320, 50, 90, '#4a7a2a');
blob(500, 200, 80, 60, '#5a8a4a');
blob(650, 220, 130, 90, '#4a7a3a');
blob(540, 310, 60, 80, '#6a7a3a');
blob(800, 360, 60, 40, '#7a6a3a');
ectx.fillStyle = 'rgba(255,255,255,0.85)';
ectx.fillRect(0, 0, 1024, 30);
ectx.fillRect(0, 482, 1024, 30);
for (let i = 0; i < 2500; i++) {
  ectx.fillStyle = `rgba(${Math.random() > 0.5 ? 255 : 60}, 255, 255, ${Math.random() * 0.08})`;
  ectx.fillRect(Math.random() * 1024, Math.random() * 512, 2, 2);
}
const earthTex = new THREE.CanvasTexture(earthCanvas);

const earthMat = new THREE.ShaderMaterial({
  uniforms: {
    uTexture: { value: earthTex },
    uSunDirection: { value: new THREE.Vector3(1, 0, 0) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D uTexture;
    uniform vec3 uSunDirection;
    varying vec2 vUv;
    void main() {
      float lon = (vUv.x - 0.5) * 6.2831853;
      float lat = (vUv.y - 0.5) * 3.1415927;
      vec3 n = vec3(cos(lat) * cos(lon), sin(lat), cos(lat) * sin(lon));
      float cosTheta = dot(n, normalize(uSunDirection));
      float ins = max(cosTheta, 0.0);
      vec3 base = texture2D(uTexture, vUv).rgb;
      vec3 coolCol = vec3(0.25, 0.45, 1.0);
      vec3 midCol  = vec3(0.4, 0.85, 0.4);
      vec3 warmCol = vec3(1.0, 0.8, 0.2);
      vec3 hotCol  = vec3(1.0, 0.3, 0.2);
      vec3 insCol;
      if (ins < 0.2) insCol = mix(coolCol, midCol, ins / 0.2);
      else if (ins < 0.5) insCol = mix(midCol, warmCol, (ins - 0.2) / 0.3);
      else insCol = mix(warmCol, hotCol, clamp((ins - 0.5) / 0.5, 0.0, 1.0));
      float dayMix = smoothstep(-0.1, 0.1, cosTheta);
      vec3 nightColor = base * 0.08;
      vec3 dayColor = mix(base, insCol, 0.55) * (0.4 + ins * 0.9);
      vec3 color = mix(nightColor, dayColor, dayMix);
      color += vec3(1.0, 0.95, 0.8) * pow(max(cosTheta, 0.0), 16.0) * 0.2;
      gl_FragColor = vec4(color, 1.0);
    }
  `
});
const earth = new THREE.Mesh(new THREE.SphereGeometry(2.2, 64, 64), earthMat);
earthSpin.add(earth);

// Axis & poles
const axis = new THREE.Mesh(
  new THREE.CylinderGeometry(0.03, 0.03, 6.5, 8),
  new THREE.MeshBasicMaterial({ color: 0xffaa00 })
);
earthTiltGroup.add(axis);
const poleN = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), new THREE.MeshBasicMaterial({ color: 0xff4444 }));
poleN.position.y = 2.4; earthTiltGroup.add(poleN);
const poleS = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), new THREE.MeshBasicMaterial({ color: 0x4488ff }));
poleS.position.y = -2.4; earthTiltGroup.add(poleS);

// Equator
const equator = new THREE.Mesh(
  new THREE.RingGeometry(2.22, 2.24, 64),
  new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
);
equator.rotation.x = Math.PI / 2;
earthTiltGroup.add(equator);

// Observer
const observer = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), new THREE.MeshBasicMaterial({ color: 0x00ff88 }));
earthSpin.add(observer);

let latRing = null;
function updateLatRing(lat) {
  if (latRing) earthTiltGroup.remove(latRing);
  const latRad = lat * Math.PI / 180;
  const r = 2.22 * Math.cos(latRad);
  const y = 2.22 * Math.sin(latRad);
  const g = new THREE.RingGeometry(r - 0.015, r + 0.015, 64);
  const m = new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
  latRing = new THREE.Mesh(g, m);
  latRing.rotation.x = Math.PI / 2;
  latRing.position.y = y;
  earthTiltGroup.add(latRing);
}

// Sun rays visualization — a group of translucent parallel lines emanating from sun
// We keep geometry in world space, update positions every frame to always reach toward earth
const rayCount = 28;
const rayGroup = new THREE.Group();
scene.add(rayGroup);
const rayMaterial = new THREE.LineBasicMaterial({
  color: 0xffdd66,
  transparent: true,
  opacity: 0.18,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const rays = [];
for (let i = 0; i < rayCount; i++) {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(6); // 2 points × xyz
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const line = new THREE.Line(geo, rayMaterial);
  rayGroup.add(line);
  rays.push(line);
}

// One extra highlighted ray that points to the observer
const obsRayGeo = new THREE.BufferGeometry();
obsRayGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
const obsRay = new THREE.Line(
  obsRayGeo,
  new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6, depthWrite: false })
);
scene.add(obsRay);

// State
let orbitAngle = 0;
let spinAngle = 0;
let observerLat = 37.5;
let speed = 0.5;
let playing = true;

const ORBIT_RATE = 0.04; // slower base
const SPIN_RATE = ORBIT_RATE * 365;

// UI
const speedSlider = document.getElementById('speedSlider');
const speedLabel = document.getElementById('speedLabel');
const latSlider = document.getElementById('latSlider');
const latLabel = document.getElementById('latLabel');
const regionSelect3D = document.getElementById('regionSelect3D');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedLabel.textContent = speed.toFixed(1) + '×';
});
function setLatUI(lat) {
  observerLat = lat;
  const hemi = lat >= 0 ? 'N' : 'S';
  latLabel.textContent = Math.abs(lat).toFixed(1) + '° ' + hemi;
  latSlider.value = lat;
  updateLatRing(lat);
}
latSlider.addEventListener('input', () => setLatUI(parseFloat(latSlider.value)));
regionSelect3D.addEventListener('change', () => setLatUI(parseFloat(regionSelect3D.value)));
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸ 일시정지' : '▶ 재생';
  playBtn.classList.toggle('active', playing);
});
resetBtn.addEventListener('click', () => { orbitAngle = 0; spinAngle = 0; });
document.querySelectorAll('[data-season]').forEach(btn => {
  btn.addEventListener('click', () => {
    orbitAngle = parseFloat(btn.dataset.season) * Math.PI * 2;
  });
});
setLatUI(observerLat);

// Camera controls
let camTheta = Math.PI / 2;
let camPhi = Math.PI / 3;
let camRadius = 60;
let isDragging = false;
let lastX = 0, lastY = 0;

function updateCamera() {
  camera.position.x = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.z = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = camRadius * Math.cos(camPhi);
  camera.lookAt(0, 0, 0);
}
renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastX; const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  camTheta -= dx * 0.005;
  camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - dy * 0.005));
  updateCamera();
});
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camRadius = Math.max(15, Math.min(150, camRadius + e.deltaY * 0.05));
  updateCamera();
}, { passive: false });

renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastX; const dy = e.touches[0].clientY - lastY;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  camTheta -= dx * 0.005;
  camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - dy * 0.005));
  updateCamera();
});
renderer.domElement.addEventListener('touchend', () => { isDragging = false; });
updateCamera();

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);
window.__onResize3D = onResize;

// Animation
const clock = new THREE.Clock();
const orbitPosEl = document.getElementById('orbitPos');
const decValEl = document.getElementById('decVal3D');
const timeValEl = document.getElementById('timeVal');
const altValEl = document.getElementById('altVal3D');
const insValEl = document.getElementById('insVal');
const insBarEl = document.getElementById('insBar');
const seasonDescEl = document.getElementById('seasonDesc3D');

function orbitPositionName(angle) {
  const a = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const frac = a / (Math.PI * 2);
  if (frac < 0.125 || frac >= 0.875) return '🌸 봄 근처';
  if (frac < 0.375) return '☀️ 여름 근처';
  if (frac < 0.625) return '🍂 가을 근처';
  return '❄️ 겨울 근처';
}

function seasonDescription(lat, dec, alt) {
  if (alt <= 0) return '극야: 하루 종일 태양이 지평선 아래에 있습니다.';
  if (alt >= 85) return '태양이 머리 위에 수직으로 가깝습니다. 일사량이 극도로 집중됩니다.';
  const sameHemi = (lat >= 0 && dec > 2) || (lat < 0 && dec < -2);
  const oppHemi = (lat >= 0 && dec < -2) || (lat < 0 && dec > 2);
  if (sameHemi && alt > 60) return '여름철: 태양 고도가 높아 빛이 집중되어 기온이 올라갑니다.';
  if (oppHemi && alt < 30) return '겨울철: 태양 고도가 낮아 빛이 넓게 퍼져 기온이 낮습니다.';
  return '봄/가을: 온화한 계절, 태양 고도가 중간 정도입니다.';
}

const _v1 = new THREE.Vector3();
const _v2 = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (playing) {
    orbitAngle += ORBIT_RATE * speed * dt;
    spinAngle += SPIN_RATE * speed * dt * 0.1;
  }

  earthPivot.position.x = ORBIT_RADIUS * Math.cos(orbitAngle);
  earthPivot.position.z = ORBIT_RADIUS * Math.sin(orbitAngle);
  earthSpin.rotation.y = spinAngle;

  // Compute earth position in world
  const earthWorld = new THREE.Vector3();
  earthPivot.getWorldPosition(earthWorld);
  const sunWorld = new THREE.Vector3(0, 0, 0);
  const sunDirWorld = sunWorld.clone().sub(earthWorld).normalize();

  // Into earthSpin local frame
  const invMat = new THREE.Matrix4().copy(earthSpin.matrixWorld).invert();
  const sunDirLocal = sunDirWorld.clone().applyMatrix4(new THREE.Matrix4().extractRotation(invMat));
  earthMat.uniforms.uSunDirection.value.copy(sunDirLocal);

  // Observer placement
  const latRad = observerLat * Math.PI / 180;
  const obsLocal = new THREE.Vector3(
    2.22 * Math.cos(latRad), 2.22 * Math.sin(latRad), 0
  );
  observer.position.copy(obsLocal);

  const obsWorld = obsLocal.clone().applyMatrix4(earthSpin.matrixWorld);
  const obsNormalWorld = obsWorld.clone().sub(earthWorld).normalize();
  const sunDirAtObs = sunWorld.clone().sub(obsWorld).normalize();
  const cosAngle = obsNormalWorld.dot(sunDirAtObs);
  const altitudeDeg = Math.asin(Math.max(-1, Math.min(1, cosAngle))) * 180 / Math.PI;
  const insolation = Math.max(0, cosAngle) * 100;

  // Local time
  const obsFlat = new THREE.Vector3(obsNormalWorld.x, 0, obsNormalWorld.z).normalize();
  const sunFlat = new THREE.Vector3(sunDirAtObs.x, 0, sunDirAtObs.z).normalize();
  const hourAngle = Math.atan2(
    obsFlat.x * sunFlat.z - obsFlat.z * sunFlat.x,
    obsFlat.x * sunFlat.x + obsFlat.z * sunFlat.z
  );
  let hours = 12 + (hourAngle / Math.PI) * 12;
  hours = ((hours % 24) + 24) % 24;
  const hh = Math.floor(hours);
  const mm = Math.floor((hours - hh) * 60);

  const declination = AXIAL_TILT * 180 / Math.PI * Math.sin(orbitAngle);

  orbitPosEl.textContent = orbitPositionName(orbitAngle);
  decValEl.textContent = declination.toFixed(1) + '°';
  timeValEl.textContent = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  altValEl.textContent = altitudeDeg > 0 ? altitudeDeg.toFixed(1) + '°' : '지평선 아래';
  insValEl.textContent = Math.round(insolation) + '%';
  insBarEl.style.width = insolation + '%';
  seasonDescEl.textContent = seasonDescription(observerLat, declination, altitudeDeg);

  // Update sun rays — parallel beams from sun toward earth
  // Build an orthonormal basis (u,v) perpendicular to sun->earth direction
  const sunToEarth = earthWorld.clone().sub(sunWorld).normalize();
  const up = Math.abs(sunToEarth.y) > 0.9 ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,1,0);
  const u = new THREE.Vector3().crossVectors(sunToEarth, up).normalize();
  const v = new THREE.Vector3().crossVectors(sunToEarth, u).normalize();
  const beamRadius = 2.5; // rays cover a disk slightly wider than earth
  const rayStartOffset = 3.8; // start just outside sun surface
  const rayEndOffset = ORBIT_RADIUS + 6; // well past earth
  for (let i = 0; i < rayCount; i++) {
    const t = i / rayCount;
    // Mix between grid and radial — place rays in a disk pattern
    const angle = t * Math.PI * 2;
    const r = beamRadius * (0.3 + 0.7 * ((i * 7) % rayCount) / rayCount);
    const off = u.clone().multiplyScalar(Math.cos(angle) * r).add(v.clone().multiplyScalar(Math.sin(angle) * r));
    const start = sunWorld.clone().add(sunToEarth.clone().multiplyScalar(rayStartOffset)).add(off);
    const end = sunWorld.clone().add(sunToEarth.clone().multiplyScalar(rayEndOffset)).add(off);
    const arr = rays[i].geometry.attributes.position.array;
    arr[0] = start.x; arr[1] = start.y; arr[2] = start.z;
    arr[3] = end.x;   arr[4] = end.y;   arr[5] = end.z;
    rays[i].geometry.attributes.position.needsUpdate = true;
  }

  // Observer ray (only when lit)
  const obsArr = obsRayGeo.attributes.position.array;
  if (insolation > 0) {
    obsRay.visible = true;
    obsArr[0] = sunWorld.x; obsArr[1] = sunWorld.y; obsArr[2] = sunWorld.z;
    obsArr[3] = obsWorld.x; obsArr[4] = obsWorld.y; obsArr[5] = obsWorld.z;
    obsRayGeo.attributes.position.needsUpdate = true;
  } else {
    obsRay.visible = false;
  }

  // Sun pulsation
  const t = performance.now() * 0.001;
  glow.scale.set(14 + Math.sin(t * 2) * 0.5, 14 + Math.sin(t * 2) * 0.5, 1);

  renderer.render(scene, camera);
}

animate();
</script>

<!-- ========== 2D Simulation ========== -->
<script>
(() => {
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const regionSelect = document.getElementById('regionSelect2D');
  const monthSlider = document.getElementById('monthSlider');
  const monthLabel = document.getElementById('monthLabel');
  const decVal = document.getElementById('decVal2D');
  const altVal = document.getElementById('altVal2D');
  const sunVal = document.getElementById('sunVal');
  const seasonDesc = document.getElementById('seasonDesc2D');

  const EARTH_RADIUS = 120;
  const CX = 400;
  const CY = 200;

  function updateSimulation() {
    const lat = parseFloat(regionSelect.value);
    const month = parseFloat(monthSlider.value);
    const declination = 23.5 * Math.cos((month - 6) * Math.PI / 6);

    let monthInt = Math.round(month);
    if (monthInt > 12) monthInt = 12;
    let seasonText = `${monthInt}월`;
    if (monthInt >= 3 && monthInt <= 5) seasonText += " (🌸 북반구 봄)";
    else if (monthInt >= 6 && monthInt <= 8) seasonText += " (☀️ 북반구 여름)";
    else if (monthInt >= 9 && monthInt <= 11) seasonText += " (🍂 북반구 가을)";
    else seasonText += " (❄️ 북반구 겨울)";
    monthLabel.textContent = seasonText;

    let elevation = 90 - Math.abs(lat - declination);
    if (elevation < 0) elevation = 0;
    const intensity = Math.sin(elevation * Math.PI / 180) * 100;

    decVal.textContent = declination.toFixed(1) + '°';
    altVal.textContent = elevation.toFixed(1) + '°';
    sunVal.textContent = Math.round(intensity) + '%';

    if (elevation === 0) {
      seasonDesc.textContent = "극야 현상: 하루 종일 태양이 뜨지 않습니다.";
      seasonDesc.style.color = "#aaaaaa";
    } else if (intensity >= 80) {
      seasonDesc.textContent = "태양 고도가 매우 높아 빛이 수직에 가깝게 내리쬡니다. 일사량이 집중되어 덥습니다.";
      seasonDesc.style.color = "#ff6666";
    } else if (intensity >= 40) {
      seasonDesc.textContent = "태양 고도가 중간 정도입니다. 온화한 기후가 나타납니다.";
      seasonDesc.style.color = "#66cc66";
    } else {
      seasonDesc.textContent = "태양 고도가 낮아 빛이 넓게 퍼집니다. 단위 면적당 받는 에너지가 적어 춥습니다.";
      seasonDesc.style.color = "#66bbff";
    }

    draw(lat, declination, elevation);
  }

  function draw(lat, declination, elevation) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const sunGradient = ctx.createRadialGradient(0, CY, 20, 0, CY, 150);
    sunGradient.addColorStop(0, 'rgba(255, 200, 0, 1)');
    sunGradient.addColorStop(1, 'rgba(255, 200, 0, 0)');
    ctx.fillStyle = sunGradient;
    ctx.beginPath();
    ctx.arc(0, CY, 150, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255, 220, 100, 0.4)';
    ctx.lineWidth = 2;
    for (let i = -100; i <= 100; i += 20) {
      ctx.beginPath();
      ctx.moveTo(100, CY + i);
      ctx.lineTo(CX - EARTH_RADIUS - 10, CY + i);
      ctx.stroke();
    }

    const northAngle = (270 - declination) * Math.PI / 180;
    const southAngle = (90 - declination) * Math.PI / 180;

    const earthGrad = ctx.createLinearGradient(CX - EARTH_RADIUS, CY, CX + EARTH_RADIUS, CY);
    earthGrad.addColorStop(0, '#4facfe');
    earthGrad.addColorStop(0.5, '#0052a2');
    earthGrad.addColorStop(1, '#001a33');
    ctx.beginPath();
    ctx.arc(CX, CY, EARTH_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = earthGrad;
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(northAngle) * (EARTH_RADIUS + 30), CY + Math.sin(northAngle) * (EARTH_RADIUS + 30));
    ctx.lineTo(CX + Math.cos(southAngle) * (EARTH_RADIUS + 30), CY + Math.sin(southAngle) * (EARTH_RADIUS + 30));
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);

    const noonAngleDeg = 180 - declination + lat;
    const noonAngle = noonAngleDeg * Math.PI / 180;
    const px = CX + Math.cos(noonAngle) * EARTH_RADIUS;
    const py = CY + Math.sin(noonAngle) * EARTH_RADIUS;

    const eqLeft = 180 - declination;
    const eqRight = -declination;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(eqLeft * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(eqLeft * Math.PI/180) * EARTH_RADIUS);
    ctx.lineTo(CX + Math.cos(eqRight * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(eqRight * Math.PI/180) * EARTH_RADIUS);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    const latLeft = noonAngleDeg;
    const latRight = -declination - lat;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(latLeft * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(latLeft * Math.PI/180) * EARTH_RADIUS);
    ctx.lineTo(CX + Math.cos(latRight * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(latRight * Math.PI/180) * EARTH_RADIUS);
    ctx.strokeStyle = 'rgba(0, 255, 100, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#00ff66';
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();

    if (elevation > 0) {
      const tangentAngle = noonAngle + Math.PI / 2;
      const tx1 = px + Math.cos(tangentAngle) * 40;
      const ty1 = py + Math.sin(tangentAngle) * 40;
      const tx2 = px - Math.cos(tangentAngle) * 40;
      const ty2 = py - Math.sin(tangentAngle) * 40;
      ctx.beginPath();
      ctx.moveTo(tx1, ty1);
      ctx.lineTo(tx2, ty2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, py);
      ctx.lineTo(px, py);
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(px, py, 20, Math.PI, tangentAngle - Math.PI, true);
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.fillText('N', CX + Math.cos(northAngle) * (EARTH_RADIUS + 40) - 5, CY + Math.sin(northAngle) * (EARTH_RADIUS + 40));
    ctx.fillText('S', CX + Math.cos(southAngle) * (EARTH_RADIUS + 40) - 5, CY + Math.sin(southAngle) * (EARTH_RADIUS + 40));
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('적도', CX - 20, CY + 15);
    ctx.fillStyle = '#00ff66';
    ctx.fillText('선택 위도', px + 10, py - 10);
  }

  regionSelect.addEventListener('change', updateSimulation);
  monthSlider.addEventListener('input', updateSimulation);
  updateSimulation();
})();
</script>
