<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 태양-지구 공전/자전 시뮬레이션</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
  }
  #canvas-container {
    position: fixed;
    inset: 0;
  }
  #ui {
    position: fixed;
    top: 16px;
    left: 16px;
    width: 320px;
    max-width: calc(100vw - 32px);
    background: rgba(20, 20, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    z-index: 10;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  h2 {
    margin: 0 0 4px 0;
    font-size: 1.05rem;
  }
  .subtitle {
    color: #a0a0b0;
    font-size: 0.8rem;
    margin-bottom: 14px;
  }
  .group {
    margin-bottom: 14px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: #d0d0e0;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .val-tag {
    color: #ffd700;
    font-weight: 700;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #ffaa00;
  }
  select, button {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1a1a24;
    color: #fff;
    font-size: 0.9rem;
  }
  button {
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #2a2a38; }
  button.active { background: #ffaa00; color: #000; border-color: #ffaa00; }
  .btn-row { display: flex; gap: 6px; }
  .btn-row button { flex: 1; }

  .info {
    background: rgba(0,0,0,0.4);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
    line-height: 1.5;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .bar {
    height: 8px;
    background: #222;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 6px;
  }
  .bar > div {
    height: 100%;
    background: linear-gradient(90deg, #66bbff, #66cc66, #ffcc00, #ff6666);
    transition: width 0.2s;
  }
  #legend {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: rgba(20,20,30,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.78rem;
    z-index: 10;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 3px 0;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
  .season-desc {
    margin-top: 8px;
    padding: 8px;
    background: rgba(255,170,0,0.1);
    border-left: 3px solid #ffaa00;
    border-radius: 4px;
    font-size: 0.8rem;
    line-height: 1.4;
  }
  @media (max-width: 600px) {
    #ui { width: calc(100vw - 32px); font-size: 0.9rem; }
    #legend { font-size: 0.7rem; padding: 8px 10px; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h2>🌍 태양-지구 3D 시뮬레이션</h2>
  <div class="subtitle">공전·자전에 따른 일사량 변화</div>

  <div class="group">
    <label>재생 속도: <span class="val-tag" id="speedLabel">1.0×</span></label>
    <input type="range" id="speedSlider" min="0" max="5" step="0.1" value="1">
    <div class="btn-row" style="margin-top:6px;">
      <button id="playBtn" class="active">⏸ 일시정지</button>
      <button id="resetBtn">↺ 리셋</button>
    </div>
  </div>

  <div class="group">
    <label>계절 바로가기</label>
    <div class="btn-row">
      <button data-season="0">춘분</button>
      <button data-season="0.25">하지</button>
      <button data-season="0.5">추분</button>
      <button data-season="0.75">동지</button>
    </div>
  </div>

  <div class="group">
    <label>관찰 위도: <span class="val-tag" id="latLabel">37.5° N</span></label>
    <input type="range" id="latSlider" min="-80" max="80" step="0.5" value="37.5">
  </div>

  <div class="info">
    <div class="info-row"><span>공전 위치</span><span class="val-tag" id="orbitPos">춘분</span></div>
    <div class="info-row"><span>태양 적위</span><span class="val-tag" id="decVal">0.0°</span></div>
    <div class="info-row"><span>현재 지방시</span><span class="val-tag" id="timeVal">12:00</span></div>
    <div class="info-row"><span>태양 고도</span><span class="val-tag" id="altVal">52.5°</span></div>
    <div class="info-row"><span>일사량</span><span class="val-tag" id="insVal">79%</span></div>
    <div class="bar"><div id="insBar" style="width:79%"></div></div>
    <div class="season-desc" id="seasonDesc">태양이 적도 바로 위에 있어 낮과 밤의 길이가 같습니다.</div>
  </div>
</div>

<div id="legend">
  <div style="font-weight:700; margin-bottom:6px;">일사량 색상</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ff4444"></div>매우 강함 (80%+)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ffcc00"></div>강함 (50-80%)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#66cc66"></div>중간 (20-50%)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#4477ff"></div>약함 (0-20%)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#111"></div>밤 (태양 아래)</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ---------- Scene setup ----------
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 25, 55);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// ---------- Starfield ----------
const starsGeo = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 3000; i++) {
  const r = 400;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPositions.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, sizeAttenuation: true }));
scene.add(stars);

// ---------- Sun ----------
const sunGroup = new THREE.Group();
scene.add(sunGroup);

const sunGeo = new THREE.SphereGeometry(3.5, 32, 32);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
const sun = new THREE.Mesh(sunGeo, sunMat);
sunGroup.add(sun);

// Sun glow (sprite)
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 256; glowCanvas.height = 256;
const gctx = glowCanvas.getContext('2d');
const grad = gctx.createRadialGradient(128, 128, 20, 128, 128, 128);
grad.addColorStop(0, 'rgba(255,220,80,0.9)');
grad.addColorStop(0.3, 'rgba(255,180,40,0.4)');
grad.addColorStop(1, 'rgba(255,120,0,0)');
gctx.fillStyle = grad;
gctx.fillRect(0, 0, 256, 256);
const glowTex = new THREE.CanvasTexture(glowCanvas);
const glowMat = new THREE.SpriteMaterial({ map: glowTex, blending: THREE.AdditiveBlending, depthWrite: false });
const glow = new THREE.Sprite(glowMat);
glow.scale.set(14, 14, 1);
sunGroup.add(glow);

// Sun point light (for calculation; actual coloring is done via shader)
const sunLight = new THREE.PointLight(0xffffff, 2, 0, 0);
sunGroup.add(sunLight);

// Ambient fill (very low)
scene.add(new THREE.AmbientLight(0x222244, 0.3));

// ---------- Earth orbit parameters ----------
const ORBIT_RADIUS = 30;
const AXIAL_TILT = 23.5 * Math.PI / 180;

// Orbit ring visualization
const orbitRingGeo = new THREE.RingGeometry(ORBIT_RADIUS - 0.05, ORBIT_RADIUS + 0.05, 128);
const orbitRingMat = new THREE.MeshBasicMaterial({ color: 0x444466, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
const orbitRing = new THREE.Mesh(orbitRingGeo, orbitRingMat);
orbitRing.rotation.x = Math.PI / 2;
scene.add(orbitRing);

// ---------- Earth ----------
// The earth has its axis in a FIXED direction in space (always tilted toward
// +X, say). As it orbits, the hemisphere facing the sun changes.
// We implement this by:
//   - earthPivot: positioned on the orbit, NOT rotated (keeps axis direction fixed)
//   - earthTiltGroup: rotated by axial tilt around Z, fixed in world orientation
//   - earthSpin: rotates around its local Y (tilted axis) to simulate day/night

const earthPivot = new THREE.Object3D();
scene.add(earthPivot);

const earthTiltGroup = new THREE.Object3D();
earthTiltGroup.rotation.z = AXIAL_TILT; // axial tilt direction fixed in world space
earthPivot.add(earthTiltGroup);

const earthSpin = new THREE.Object3D();
earthTiltGroup.add(earthSpin);

// Earth sphere with procedural land/ocean texture and custom shader for day/night + insolation
const earthCanvas = document.createElement('canvas');
earthCanvas.width = 1024; earthCanvas.height = 512;
const ectx = earthCanvas.getContext('2d');
// Ocean base
const oceanGrad = ectx.createLinearGradient(0, 0, 0, 512);
oceanGrad.addColorStop(0, '#1a4a7a');
oceanGrad.addColorStop(0.5, '#2266aa');
oceanGrad.addColorStop(1, '#1a4a7a');
ectx.fillStyle = oceanGrad;
ectx.fillRect(0, 0, 1024, 512);
// Fake continents (blobs)
function blob(cx, cy, rx, ry, color) {
  ectx.fillStyle = color;
  ectx.beginPath();
  ectx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ectx.fill();
}
// Rough continent shapes
blob(180, 180, 90, 70, '#3a8a3a');  // N America
blob(220, 320, 50, 90, '#4a7a2a');  // S America
blob(500, 200, 80, 60, '#5a8a4a');  // Europe/Asia W
blob(650, 220, 130, 90, '#4a7a3a'); // Asia
blob(540, 310, 60, 80, '#6a7a3a');  // Africa
blob(800, 360, 60, 40, '#7a6a3a');  // Australia
// Polar caps
ectx.fillStyle = 'rgba(255,255,255,0.85)';
ectx.fillRect(0, 0, 1024, 30);
ectx.fillRect(0, 482, 1024, 30);
// Noise
for (let i = 0; i < 2500; i++) {
  ectx.fillStyle = `rgba(${Math.random() > 0.5 ? 255 : 60}, 255, 255, ${Math.random() * 0.08})`;
  ectx.fillRect(Math.random() * 1024, Math.random() * 512, 2, 2);
}
const earthTex = new THREE.CanvasTexture(earthCanvas);

// Custom shader material: colors surface by insolation (cos of angle between surface normal and sun direction)
const earthMat = new THREE.ShaderMaterial({
  uniforms: {
    uTexture: { value: earthTex },
    uSunDirection: { value: new THREE.Vector3(1, 0, 0) }, // in Earth's local (spin) frame
    uShowInsolation: { value: 1.0 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      // We also need the object-space normal for sun-angle calc
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D uTexture;
    uniform vec3 uSunDirection; // expressed in the earth's spin local frame (unit vector)
    uniform float uShowInsolation;
    varying vec2 vUv;
    varying vec3 vNormal;

    // We need surface normal in the same frame as uSunDirection.
    // Reconstruct from uv: uv.x in [0,1] -> longitude (0..2pi), uv.y in [0,1] -> latitude (-pi/2..pi/2)
    void main() {
      float lon = (vUv.x - 0.5) * 6.2831853;
      float lat = (vUv.y - 0.5) * 3.1415927;
      vec3 n = vec3(cos(lat) * cos(lon), sin(lat), cos(lat) * sin(lon));

      float cosTheta = dot(n, normalize(uSunDirection));
      // Insolation factor: 0 at night, peaks at 1 at subsolar point
      float ins = max(cosTheta, 0.0);

      vec3 base = texture2D(uTexture, vUv).rgb;

      // Map insolation to overlay color
      vec3 coolCol = vec3(0.25, 0.45, 1.0);   // low
      vec3 midCol  = vec3(0.4, 0.85, 0.4);    // mid
      vec3 warmCol = vec3(1.0, 0.8, 0.2);     // high
      vec3 hotCol  = vec3(1.0, 0.3, 0.2);     // very high
      vec3 insCol;
      if (ins < 0.2) insCol = mix(coolCol, midCol, ins / 0.2);
      else if (ins < 0.5) insCol = mix(midCol, warmCol, (ins - 0.2) / 0.3);
      else insCol = mix(warmCol, hotCol, clamp((ins - 0.5) / 0.5, 0.0, 1.0));

      // Night side: darken strongly
      float dayMix = smoothstep(-0.1, 0.1, cosTheta);
      vec3 nightColor = base * 0.08;
      vec3 dayColor = mix(base, insCol, 0.55) * (0.4 + ins * 0.9);

      vec3 color = mix(nightColor, dayColor, dayMix);

      // Specular-ish highlight on subsolar region
      color += vec3(1.0, 0.95, 0.8) * pow(max(cosTheta, 0.0), 16.0) * 0.2;

      gl_FragColor = vec4(color, 1.0);
    }
  `
});

const earthGeo = new THREE.SphereGeometry(2.2, 64, 64);
const earth = new THREE.Mesh(earthGeo, earthMat);
earthSpin.add(earth);

// Axis visualization (tilted, rotates with earthTiltGroup but not spin)
const axisGeo = new THREE.CylinderGeometry(0.03, 0.03, 6.5, 8);
const axisMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
const axis = new THREE.Mesh(axisGeo, axisMat);
earthTiltGroup.add(axis);

// N / S pole markers
const poleGeoN = new THREE.SphereGeometry(0.12, 12, 12);
const poleMatN = new THREE.MeshBasicMaterial({ color: 0xff4444 });
const poleN = new THREE.Mesh(poleGeoN, poleMatN);
poleN.position.y = 2.4;
earthTiltGroup.add(poleN);
const poleS = new THREE.Mesh(poleGeoN, new THREE.MeshBasicMaterial({ color: 0x4488ff }));
poleS.position.y = -2.4;
earthTiltGroup.add(poleS);

// Equator line
const equatorGeo = new THREE.RingGeometry(2.22, 2.24, 64);
const equatorMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
const equator = new THREE.Mesh(equatorGeo, equatorMat);
equator.rotation.x = Math.PI / 2;
earthTiltGroup.add(equator); // tilts with earth, doesn't spin

// Observer marker (dot at selected latitude) - this one DOES spin with earth
const obsGeo = new THREE.SphereGeometry(0.12, 12, 12);
const obsMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
const observer = new THREE.Mesh(obsGeo, obsMat);
earthSpin.add(observer);

// Latitude ring (tilts with earth, doesn't spin)
let latRing = null;
function updateLatRing(lat) {
  if (latRing) earthTiltGroup.remove(latRing);
  const latRad = lat * Math.PI / 180;
  const r = 2.22 * Math.cos(latRad);
  const y = 2.22 * Math.sin(latRad);
  const g = new THREE.RingGeometry(r - 0.015, r + 0.015, 64);
  const m = new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
  latRing = new THREE.Mesh(g, m);
  latRing.rotation.x = Math.PI / 2;
  latRing.position.y = y;
  earthTiltGroup.add(latRing);
}

// ---------- State ----------
let orbitAngle = 0;       // radians, 0 = vernal equinox position
let spinAngle = 0;        // radians, earth rotation
let observerLat = 37.5;
let speed = 1.0;
let playing = true;

const ORBIT_RATE = 0.08;  // base rad/s
const SPIN_RATE = ORBIT_RATE * 365;  // 365 days per orbit (relative)

// ---------- UI ----------
const speedSlider = document.getElementById('speedSlider');
const speedLabel = document.getElementById('speedLabel');
const latSlider = document.getElementById('latSlider');
const latLabel = document.getElementById('latLabel');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedLabel.textContent = speed.toFixed(1) + '×';
});
latSlider.addEventListener('input', () => {
  observerLat = parseFloat(latSlider.value);
  const hemi = observerLat >= 0 ? 'N' : 'S';
  latLabel.textContent = Math.abs(observerLat).toFixed(1) + '° ' + hemi;
  updateLatRing(observerLat);
});
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸ 일시정지' : '▶ 재생';
  playBtn.classList.toggle('active', playing);
});
resetBtn.addEventListener('click', () => {
  orbitAngle = 0;
  spinAngle = 0;
});
document.querySelectorAll('[data-season]').forEach(btn => {
  btn.addEventListener('click', () => {
    const frac = parseFloat(btn.dataset.season);
    orbitAngle = frac * Math.PI * 2;
  });
});

updateLatRing(observerLat);

// ---------- Camera controls (simple orbit) ----------
let camTheta = Math.PI / 2;
let camPhi = Math.PI / 3;
let camRadius = 60;
let isDragging = false;
let lastX = 0, lastY = 0;

function updateCamera() {
  camera.position.x = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.z = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = camRadius * Math.cos(camPhi);
  camera.lookAt(0, 0, 0);
}
renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  camTheta -= dx * 0.005;
  camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - dy * 0.005));
  updateCamera();
});
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camRadius = Math.max(15, Math.min(150, camRadius + e.deltaY * 0.05));
  updateCamera();
}, { passive: false });

// touch
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  camTheta -= dx * 0.005;
  camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - dy * 0.005));
  updateCamera();
});
renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

updateCamera();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Animation ----------
const clock = new THREE.Clock();

// UI elements for data
const orbitPosEl = document.getElementById('orbitPos');
const decValEl = document.getElementById('decVal');
const timeValEl = document.getElementById('timeVal');
const altValEl = document.getElementById('altVal');
const insValEl = document.getElementById('insVal');
const insBarEl = document.getElementById('insBar');
const seasonDescEl = document.getElementById('seasonDesc');

function orbitPositionName(angle) {
  // angle=0: spring equinox (earth to +X, sun on -X side from earth perspective)
  // angle=pi/2: summer solstice (N hemisphere tilted TOWARD sun)
  const a = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const frac = a / (Math.PI * 2);
  if (frac < 0.125 || frac >= 0.875) return '춘분 근처';
  if (frac < 0.375) return '하지 근처';
  if (frac < 0.625) return '추분 근처';
  return '동지 근처';
}

function seasonDescription(lat, dec, alt) {
  if (alt <= 0) return '극야(polar night): 하루 종일 태양이 지평선 아래에 있습니다.';
  if (alt >= 85) return '태양이 머리 위에 거의 수직으로 있습니다. 일사량이 극도로 집중됩니다.';
  const sameHemi = (lat >= 0 && dec > 2) || (lat < 0 && dec < -2);
  const oppHemi = (lat >= 0 && dec < -2) || (lat < 0 && dec > 2);
  if (sameHemi && alt > 60) return '여름철: 태양 고도가 높아 빛이 집중되어 기온이 올라갑니다.';
  if (oppHemi && alt < 30) return '겨울철: 태양 고도가 낮아 빛이 넓게 퍼져 기온이 낮습니다.';
  return '봄/가을: 온화한 계절, 태양 고도가 중간 정도입니다.';
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (playing) {
    orbitAngle += ORBIT_RATE * speed * dt;
    spinAngle += SPIN_RATE * speed * dt * 0.1; // slowed so days are visible
  }

  // Position earth on orbit (in xz-plane)
  earthPivot.position.x = ORBIT_RADIUS * Math.cos(orbitAngle);
  earthPivot.position.z = ORBIT_RADIUS * Math.sin(orbitAngle);
  // earthPivot has NO rotation → axial tilt direction stays fixed in world

  // Spin earth around its local (tilted) Y
  earthSpin.rotation.y = spinAngle;

  // Compute sun direction in earth's spin local frame
  // World sun direction (from earth to sun)
  const earthWorld = new THREE.Vector3();
  earthPivot.getWorldPosition(earthWorld);
  const sunWorld = new THREE.Vector3(0, 0, 0);
  const sunDirWorld = sunWorld.clone().sub(earthWorld).normalize();

  // Transform into earthSpin local frame
  const invMat = new THREE.Matrix4().copy(earthSpin.matrixWorld).invert();
  const sunDirLocal = sunDirWorld.clone().applyMatrix4(new THREE.Matrix4().extractRotation(invMat));
  earthMat.uniforms.uSunDirection.value.copy(sunDirLocal);

  // Position observer on earth's surface at selected latitude
  // In earth spin local frame: longitude 0 corresponds to +X (say)
  // We can use a fixed "observer longitude" (e.g., 0 in spin frame) — this means
  // observer rotates WITH earth, so local "noon" happens once per spin period.
  const latRad = observerLat * Math.PI / 180;
  const obsLocal = new THREE.Vector3(
    2.22 * Math.cos(latRad),
    2.22 * Math.sin(latRad),
    0
  );
  observer.position.copy(obsLocal);

  // Compute observer world position & normal
  const obsWorld = obsLocal.clone().applyMatrix4(earthSpin.matrixWorld);
  const obsNormalWorld = obsWorld.clone().sub(earthWorld).normalize();
  const sunDirAtObs = sunWorld.clone().sub(obsWorld).normalize();
  const cosAngle = obsNormalWorld.dot(sunDirAtObs);
  const altitudeDeg = Math.asin(Math.max(-1, Math.min(1, cosAngle))) * 180 / Math.PI;
  const insolation = Math.max(0, cosAngle) * 100;

  // Local time approximation: based on observer's azimuthal position vs sun
  // Project obs normal onto orbital (xz) plane, compare to sun dir
  const obsFlat = new THREE.Vector3(obsNormalWorld.x, 0, obsNormalWorld.z).normalize();
  const sunFlat = new THREE.Vector3(sunDirAtObs.x, 0, sunDirAtObs.z).normalize();
  // Signed angle: 0 = sun directly "south" (local noon in NH)
  let hourAngle = Math.atan2(
    obsFlat.x * sunFlat.z - obsFlat.z * sunFlat.x,
    obsFlat.x * sunFlat.x + obsFlat.z * sunFlat.z
  );
  // Map [-pi, pi] to [0, 24h], where 0 -> 12:00 noon
  let hours = 12 + (hourAngle / Math.PI) * 12;
  hours = ((hours % 24) + 24) % 24;
  const hh = Math.floor(hours);
  const mm = Math.floor((hours - hh) * 60);

  // Sun declination from orbit angle
  const declination = AXIAL_TILT * 180 / Math.PI * Math.sin(orbitAngle);

  // Update UI
  orbitPosEl.textContent = orbitPositionName(orbitAngle);
  decValEl.textContent = declination.toFixed(1) + '°';
  timeValEl.textContent = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  altValEl.textContent = altitudeDeg > 0 ? altitudeDeg.toFixed(1) + '°' : '지평선 아래';
  insValEl.textContent = Math.round(insolation) + '%';
  insBarEl.style.width = insolation + '%';
  seasonDescEl.textContent = seasonDescription(observerLat, declination, altitudeDeg);

  // Slight sun pulsation
  const t = performance.now() * 0.001;
  glow.scale.set(14 + Math.sin(t * 2) * 0.5, 14 + Math.sin(t * 2) * 0.5, 1);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
