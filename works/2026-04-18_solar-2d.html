<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계절별 태양 고도 및 일사량 시뮬레이션</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #1a1a24;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        p.desc {
            color: #a0a0b0;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls {
            background: #2a2a35;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e0e0e0;
        }
        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #4a4a5a;
            background: #1a1a24;
            color: white;
        }
        .info-panel {
            background: #1e1e28;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #3a3a4a;
            margin-top: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .info-row:last-child { margin-bottom: 0; }
        .val { font-weight: bold; color: #ffd700; }
        
        .simulation {
            position: relative;
            background: #0d0d14;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #2a2a35;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <h1>🌍 국가별 태양 고도와 계절 시뮬레이션</h1>
    <p class="desc">월별 지구의 자전축 기울기 변화와 각 위도별 태양의 남중고도, 일사량을 확인해보세요.</p>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label for="regionSelect">관찰 지역 선택</label>
                <select id="regionSelect">
                    <option value="37.5">대한민국 (북위 37.5°) - 뚜렷한 사계절</option>
                    <option value="15.0">태국 (북위 15.0°) - 열대 기후</option>
                    <option value="60.0">북유럽 오슬로 (북위 60.0°) - 극심한 계절차</option>
                    <option value="0.0">적도 (위도 0°) - 연중 일정한 온도</option>
                    <option value="-34.0">호주 시드니 (남위 34.0°) - 북반구와 반대 계절</option>
                </select>
            </div>

            <div class="control-group">
                <label for="monthSlider">월 (계절) 선택: <span id="monthLabel" style="color:#ffd700;">6월 (북반구 여름)</span></label>
                <input type="range" id="monthSlider" min="1" max="12" step="0.1" value="6">
            </div>

            <div class="info-panel">
                <div class="info-row"><span>태양 적위 (지구 기울기 효과):</span> <span class="val" id="decVal">23.5°</span></div>
                <div class="info-row"><span>관측지 남중고도:</span> <span class="val" id="altVal">76.0°</span></div>
                <div class="info-row"><span>상대적 빛의 양 (일사량):</span> <span class="val" id="sunVal">97%</span></div>
                <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 10px 0;">
                <div class="info-row"><span id="seasonDesc" style="color: #88ccff; font-size: 0.9rem; line-height: 1.4;">여름철로, 태양 고도가 높아 빛이 집중되어 기온이 오릅니다.</span></div>
            </div>
        </div>

        <div class="simulation">
            <canvas id="simCanvas" width="600" height="400"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const regionSelect = document.getElementById('regionSelect');
        const monthSlider = document.getElementById('monthSlider');
        const monthLabel = document.getElementById('monthLabel');
        const decVal = document.getElementById('decVal');
        const altVal = document.getElementById('altVal');
        const sunVal = document.getElementById('sunVal');
        const seasonDesc = document.getElementById('seasonDesc');

        const EARTH_RADIUS = 120;
        const CX = 400;
        const CY = 200;

        function updateSimulation() {
            const lat = parseFloat(regionSelect.value);
            const month = parseFloat(monthSlider.value);
            
            const declination = 23.5 * Math.cos((month - 6) * Math.PI / 6);
            
            let monthInt = Math.round(month);
            if(monthInt > 12) monthInt = 12;
            let seasonText = `${monthInt}월`;
            if (monthInt >= 3 && monthInt <= 5) seasonText += " (북반구 봄)";
            else if (monthInt >= 6 && monthInt <= 8) seasonText += " (북반구 여름)";
            else if (monthInt >= 9 && monthInt <= 11) seasonText += " (북반구 가을)";
            else seasonText += " (북반구 겨울)";
            monthLabel.textContent = seasonText;

            let elevation = 90 - Math.abs(lat - declination);
            if (elevation < 0) elevation = 0;

            const intensity = Math.sin(elevation * Math.PI / 180) * 100;

            decVal.textContent = declination.toFixed(1) + '°';
            altVal.textContent = elevation.toFixed(1) + '°';
            sunVal.textContent = Math.round(intensity) + '%';

            if (elevation === 0) {
                seasonDesc.textContent = "극야 현상: 하루 종일 태양이 뜨지 않습니다.";
                seasonDesc.style.color = "#aaaaaa";
            } else if (intensity >= 80) {
                seasonDesc.textContent = "태양 고도가 매우 높아 빛이 수직에 가깝게 내리쬡니다. 일사량이 집중되어 덥습니다.";
                seasonDesc.style.color = "#ff6666";
            } else if (intensity >= 40) {
                seasonDesc.textContent = "태양 고도가 중간 정도입니다. 온화한 기후가 나타납니다.";
                seasonDesc.style.color = "#66cc66";
            } else {
                seasonDesc.textContent = "태양 고도가 낮아 빛이 넓게 퍼집니다. 단위 면적당 받는 에너지가 적어 춥습니다.";
                seasonDesc.style.color = "#66bbff";
            }

            draw(lat, declination, elevation);
        }

        function draw(lat, declination, elevation) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const sunGradient = ctx.createRadialGradient(0, CY, 20, 0, CY, 150);
            sunGradient.addColorStop(0, 'rgba(255, 200, 0, 1)');
            sunGradient.addColorStop(1, 'rgba(255, 200, 0, 0)');
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(0, CY, 150, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 220, 100, 0.4)';
            ctx.lineWidth = 2;
            for (let i = -100; i <= 100; i += 20) {
                ctx.beginPath();
                ctx.moveTo(100, CY + i);
                ctx.lineTo(CX - EARTH_RADIUS - 10, CY + i);
                ctx.stroke();
            }

            const northAngle = (270 - declination) * Math.PI / 180;
            const southAngle = (90 - declination) * Math.PI / 180;

            const earthGrad = ctx.createLinearGradient(CX - EARTH_RADIUS, CY, CX + EARTH_RADIUS, CY);
            earthGrad.addColorStop(0, '#4facfe');
            earthGrad.addColorStop(0.5, '#0052a2');
            earthGrad.addColorStop(1, '#001a33');
            
            ctx.beginPath();
            ctx.arc(CX, CY, EARTH_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = earthGrad;
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(CX + Math.cos(northAngle) * (EARTH_RADIUS + 30), CY + Math.sin(northAngle) * (EARTH_RADIUS + 30));
            ctx.lineTo(CX + Math.cos(southAngle) * (EARTH_RADIUS + 30), CY + Math.sin(southAngle) * (EARTH_RADIUS + 30));
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            const noonAngleDeg = 180 - declination + lat;
            const noonAngle = noonAngleDeg * Math.PI / 180;

            const px = CX + Math.cos(noonAngle) * EARTH_RADIUS;
            const py = CY + Math.sin(noonAngle) * EARTH_RADIUS;

            const eqLeft = 180 - declination;
            const eqRight = -declination;
            ctx.beginPath();
            ctx.moveTo(CX + Math.cos(eqLeft * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(eqLeft * Math.PI/180) * EARTH_RADIUS);
            ctx.lineTo(CX + Math.cos(eqRight * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(eqRight * Math.PI/180) * EARTH_RADIUS);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            const latLeft = noonAngleDeg;
            const latRight = -declination - lat;
            ctx.beginPath();
            ctx.moveTo(CX + Math.cos(latLeft * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(latLeft * Math.PI/180) * EARTH_RADIUS);
            ctx.lineTo(CX + Math.cos(latRight * Math.PI/180) * EARTH_RADIUS, CY + Math.sin(latRight * Math.PI/180) * EARTH_RADIUS);
            ctx.strokeStyle = 'rgba(0, 255, 100, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff66';
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.stroke();

            if (elevation > 0) {
                const tangentAngle = noonAngle + Math.PI / 2;
                const tx1 = px + Math.cos(tangentAngle) * 40;
                const ty1 = py + Math.sin(tangentAngle) * 40;
                const tx2 = px - Math.cos(tangentAngle) * 40;
                const ty2 = py - Math.sin(tangentAngle) * 40;

                ctx.beginPath();
                ctx.moveTo(tx1, ty1);
                ctx.lineTo(tx2, ty2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, py);
                ctx.lineTo(px, py);
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(px, py, 20, Math.PI, tangentAngle - Math.PI, true); 
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.fillStyle = '#fff';
            ctx.font = '12px sans-serif';
            ctx.fillText('N', CX + Math.cos(northAngle) * (EARTH_RADIUS + 40) - 5, CY + Math.sin(northAngle) * (EARTH_RADIUS + 40));
            ctx.fillText('S', CX + Math.cos(southAngle) * (EARTH_RADIUS + 40) - 5, CY + Math.sin(southAngle) * (EARTH_RADIUS + 40));
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText('적도', CX - 20, CY + 15);
            ctx.fillStyle = '#00ff66';
            ctx.fillText('선택 위도', px + 10, py - 10);
        }

        regionSelect.addEventListener('change', updateSimulation);
        monthSlider.addEventListener('input', updateSimulation);

        updateSimulation();
    </script>
</body>
</html>
