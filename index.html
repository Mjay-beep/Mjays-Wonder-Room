<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민재의 호기심방 · Wonder Room</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --bg-card: #14141c;
    --bg-card-hover: #1c1c28;
    --border: #24242e;
    --border-hover: #3a3a50;
    --text: #e8e8f0;
    --text-dim: #8a8a9a;
    --accent: #ffaa00;
    --accent-dim: rgba(255, 170, 0, 0.15);
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 72px 32px 48px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: radial-gradient(ellipse at top, rgba(255,170,0,0.08), transparent 60%);
  }
  .title-ko {
    font-size: 2.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff, #ffaa00);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .title-en {
    font-size: 0.95rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 24px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.65;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 24px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .stats span strong { color: var(--accent); font-weight: 700; }

  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 32px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .search {
    position: relative;
  }
  .search input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 7px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--text-dim);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--border-hover); color: var(--text); }
  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .chip .count {
    opacity: 0.6;
    margin-left: 4px;
    font-size: 0.78rem;
  }

  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 32px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--border-hover);
    background: var(--bg-card-hover);
  }
  .card-thumb {
    aspect-ratio: 16/10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.6rem;
    position: relative;
    overflow: hidden;
  }
  .card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4));
  }
  .card-body {
    padding: 16px 18px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card-subjects {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .card-subject {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .card-subject + .card-subject::before {
    content: '·';
    margin-right: 6px;
    color: var(--text-dim);
  }
  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.35;
  }
  .card-desc {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.5;
    flex: 1;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    gap: 8px;
  }
  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    min-width: 0;
  }
  .tag {
    padding: 2px 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    font-size: 0.72rem;
    white-space: nowrap;
  }
  .date { white-space: nowrap; }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  footer {
    padding: 40px 32px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.8rem;
    text-align: center;
  }

  @media (max-width: 600px) {
    header { padding: 48px 20px 32px; }
    .title-ko { font-size: 1.85rem; }
    .controls { padding: 20px 20px 8px; }
    .grid { padding: 16px 20px 60px; grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1 class="title-ko">민재의 호기심방</h1>
  <div class="title-en">Wonder Room</div>
  <p class="subtitle">
    세상의 원리를 시뮬레이션과 인터랙티브 비주얼로 옮겨둔 아카이브.<br>
    글로 읽는 대신 움직여 보고, 바꿔 보며 이해합니다.
  </p>
  <div class="stats">
    <span><strong id="totalCount">0</strong> 작품</span>
    <span><strong id="subjectCount">0</strong> 주제</span>
  </div>
</header>

<div class="controls">
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="제목, 설명, 태그로 검색…">
  </div>
  <div class="filters" id="filters"></div>
</div>

<main class="grid" id="grid"></main>

<footer>
  민재의 호기심방 · Built with Claude · <span id="yearSpan"></span>
</footer>

<script>
  const grid = document.getElementById('grid');
  const filters = document.getElementById('filters');
  const searchInput = document.getElementById('searchInput');
  const totalCount = document.getElementById('totalCount');
  const subjectCount = document.getElementById('subjectCount');
  document.getElementById('yearSpan').textContent = new Date().getFullYear();

  let works = [];
  let activeSubject = '전체';
  let searchQuery = '';

  async function load() {
    try {
      const res = await fetch('works.json');
      const data = await res.json();
      works = data.works || [];
      // Sort by date desc (newest first)
      works.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      render();
    } catch (err) {
      grid.innerHTML = '<div class="empty">works.json을 불러올 수 없습니다. 같은 폴더에 있는지 확인해주세요.</div>';
      console.error(err);
    }
  }

  function getSubjectCounts() {
    const counts = {};
    works.forEach(w => {
      (w.subjects || []).forEach(s => {
        counts[s] = (counts[s] || 0) + 1;
      });
    });
    return counts;
  }

  function renderFilters() {
    const counts = getSubjectCounts();
    const subjects = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
    const chips = [
      `<div class="chip ${activeSubject === '전체' ? 'active' : ''}" data-subject="전체">전체<span class="count">${works.length}</span></div>`,
      ...subjects.map(s =>
        `<div class="chip ${activeSubject === s ? 'active' : ''}" data-subject="${s}">${s}<span class="count">${counts[s]}</span></div>`
      )
    ];
    filters.innerHTML = chips.join('');
    filters.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        activeSubject = chip.dataset.subject;
        render();
      });
    });
    subjectCount.textContent = subjects.length;
  }

  function filterWorks() {
    return works.filter(w => {
      const subjectMatch = activeSubject === '전체' || (w.subjects || []).includes(activeSubject);
      if (!subjectMatch) return false;
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return (
        (w.title || '').toLowerCase().includes(q) ||
        (w.description || '').toLowerCase().includes(q) ||
        (w.tags || []).some(t => t.toLowerCase().includes(q)) ||
        (w.subjects || []).some(s => s.toLowerCase().includes(q)) ||
        (w.note || '').toLowerCase().includes(q)
      );
    });
  }

  function renderCards() {
    const filtered = filterWorks();
    if (!filtered.length) {
      grid.innerHTML = '<div class="empty">조건에 맞는 작품이 없습니다.</div>';
      return;
    }
    grid.innerHTML = filtered.map(w => `
      <a href="${w.file}" class="card" target="_blank" rel="noopener">
        <div class="card-thumb" style="background: linear-gradient(135deg, ${w.color || '#24242e'}, ${shade(w.color || '#24242e', -30)});">
          <span style="position:relative; z-index:1;">${w.emoji || '✨'}</span>
        </div>
        <div class="card-body">
          <div class="card-subjects">
            ${(w.subjects || []).map(s => `<span class="card-subject">${s}</span>`).join('')}
          </div>
          <div class="card-title">${w.title}</div>
          <div class="card-desc">${w.description || ''}</div>
          <div class="card-footer">
            <div class="tags">${(w.tags || []).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <div class="date">${w.date || ''}</div>
          </div>
        </div>
      </a>
    `).join('');
  }

  function shade(hex, pct) {
    const c = hex.replace('#','');
    const num = parseInt(c, 16);
    let r = (num >> 16) + Math.round(255 * pct / 100);
    let g = ((num >> 8) & 0xff) + Math.round(255 * pct / 100);
    let b = (num & 0xff) + Math.round(255 * pct / 100);
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
  }

  function render() {
    totalCount.textContent = works.length;
    renderFilters();
    renderCards();
  }

  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderCards();
  });

  load();
</script>
</body>
</html>
